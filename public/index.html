<!DOCTYPE html>
<html>
<head>
  <title>BFHL Tree Visualizer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 30px;
    }

    h1, h2 {
      color: #38bdf8;
    }

    .box {
      background: #1e293b;
      border: 1px solid #334155;
      padding: 25px;
      border-radius: 14px;
      margin-bottom: 25px;
    }

    textarea {
      width: 100%;
      height: 130px;
      background: #0f172a;
      color: white;
      border: 1px solid #475569;
      border-radius: 10px;
      padding: 15px;
      font-size: 16px;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 15px;
      border: none;
      border-radius: 10px;
      background: #38bdf8;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 15px;
    }

    .card {
      background: #0f172a;
      padding: 25px;
      border-radius: 10px;
      text-align: center;
    }

    .card h3 {
      color: #38bdf8;
      font-size: 30px;
      margin: 5px;
    }

    .tree-box {
      background: #0f172a;
      padding: 18px;
      border-radius: 10px;
      margin-top: 15px;
      white-space: pre-line;
      font-family: monospace;
    }

    .green {
      color: #22c55e;
      font-weight: bold;
    }

    .red {
      color: #ef4444;
      font-weight: bold;
    }

    pre {
      background: #020617;
      padding: 15px;
      border-radius: 10px;
      overflow-x: auto;
    }
  </style>
</head>

<body>

  <h1>🌳 BFHL Tree Visualizer</h1>
  <p>SRM Full Stack Engineering Challenge</p>

  <div class="box">
    <h2>Enter Node Edges (comma or newline separated)</h2>
    <textarea id="input" placeholder="e.g. A->B, A->C, B->D, X->Y, Y->Z, Z->X, hello, 1->2"></textarea>
    <button onclick="submitData()">🚀 Submit</button>
  </div>

  <div id="result"></div>

<script>
async function submitData() {
  const input = document.getElementById("input").value;

  const data = input
    .split(/,|\n/)
    .map(x => x.trim())
    .filter(x => x.length > 0);

  const response = await fetch("/bfhl", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ data })
  });

  const result = await response.json();
  displayResult(result);
}

function displayResult(result) {
  const div = document.getElementById("result");

  div.innerHTML = `
    <div class="box">
      <h2>👤 User Details</h2>
      <div class="cards">
        <div class="card">
          <p>User ID</p>
          <h3>${result.user_id}</h3>
        </div>
        <div class="card">
          <p>Email</p>
          <h3 style="font-size:18px">${result.email_id}</h3>
        </div>
        <div class="card">
          <p>Roll No</p>
          <h3 style="font-size:18px">${result.college_roll_number}</h3>
        </div>
      </div>
    </div>

    <div class="box">
      <h2>📊 Summary</h2>
      <div class="cards">
        <div class="card">
          <h3>${result.summary.total_trees}</h3>
          <p>Total Trees</p>
        </div>
        <div class="card">
          <h3>${result.summary.total_cycles}</h3>
          <p>Total Cycles</p>
        </div>
        <div class="card">
          <h3>${result.summary.largest_tree_root || "—"}</h3>
          <p>Largest Tree Root</p>
        </div>
      </div>
    </div>

    <div class="box">
      <h2>🌲 Hierarchies</h2>
      ${result.hierarchies.map(h => `
        <div class="tree-box">
          <h3>Root: ${h.root}</h3>
          ${
            h.has_cycle
            ? `<p class="red">⚠ Cycle Detected</p>`
            : `<p class="green">✅ TREE — depth ${h.depth}</p>`
          }
          <pre>${JSON.stringify(h.tree, null, 2)}</pre>
        </div>
      `).join("")}
    </div>

    <div class="box">
      <h2>❌ Invalid Entries</h2>
      <p>${result.invalid_entries.length ? result.invalid_entries.join(", ") : "None"}</p>
    </div>

    <div class="box">
      <h2>🔁 Duplicate Edges</h2>
      <p>${result.duplicate_edges.length ? result.duplicate_edges.join(", ") : "None"}</p>
    </div>

    <div class="box">
      <h2>📄 Raw JSON</h2>
      <pre>${JSON.stringify(result, null, 2)}</pre>
    </div>
  `;
}
</script>

</body>
</html>
